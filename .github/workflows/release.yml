name: Release to PyPI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Validate release tag
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib

          ref_type = os.environ["GITHUB_REF_TYPE"]
          tag = os.environ["GITHUB_REF_NAME"]
          with open("pyproject.toml", "rb") as project_file:
              version = tomllib.load(project_file)["project"]["version"]
          expected_tag = f"v{version}"

          if ref_type != "tag" or re.fullmatch(r"v\d+\.\d+\.\d+", tag) is None:
              raise SystemExit("Run this workflow from a vX.Y.Z tag ref.")
          if tag != expected_tag:
              raise SystemExit(f"Tag {tag!r} does not match project version {version!r}.")
          PY
      - run: python -m pip install "build>=1.5,<2"
      - run: python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/trimwise/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
